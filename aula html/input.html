<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aula-INPUT</title>
</head>
<body>

    <!--INPUT-->
<!--qualquer dado, informção ou estímulo que entra em um sistema (computador, cérebro, processo)
para ser processado, trasferido ou consumido, gerando um resultado (output)-->


<label for="name">NOME:</label>
<input type="text" placeholder="digite seu nome"><br>

<label for="senha">SENHA:</label>
<input type="password" name="" placeholder="digite sua senha"><br>

<label for="name">Numero</label>
<input type="number" name="number" ><br>

<label for="name">Data:</label>
<input type="date" name="data" ><br>

<label for="data-hora">data/hora</label>
<input type="datetime-local" name="data-hora"><br>

<label for="sexo">sexo:</label>
<input type="radio" name="sexo" value="masculino">masculino
<input type="radio" name="sexo" value="feminino">femminino
<input type="radio" name="sexo" value="outros">outros<br>


<label for="hobbies">hobbies:</label>
<input type="checkbox" name="hobbies" value="esportes">
<input type="checkbox" name="hobbies" value="dança">
<input type="checkbox" name="hobbies" value="séries/filmes">
<input type="checkbox" name="hobbies" value="ler"><br>

<label for="arquivo">arquivo:</label>
<input type="file" name="arquivo"><br>

<label for="volume ">escala:</label>
<input type="range" name="volume" min="1" max="100"><br>

<label for="cor">cor:</label>
<input type="color" name="cor"><br>

<label for="botao">botão</label>
<input type="button" value="clique aqui"><br>

<label for="enviar">submeter:</label>
<input type="submit" name="enviar" value="enviar"><br>



</body>
</html>
